security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_CHEF_PROJET: ROLE_USER
        ROLE_ADMIN: ROLE_CHEF_PROJET

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            # Form login authentication
            form_login:
                login_path: login
                check_path: login
                username_parameter: email
                password_parameter: password
                default_target_path: projet_index
                always_use_default_target_path: false

            # Logout
            logout:
                path: logout
                target: login

            # Enable remember me functionality (optional)
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 week
                path: /

    # Access control
    access_control:
        # Voir les projets - tout le monde
        - { path: ^/projets, roles: PUBLIC_ACCESS }

        # Créer un projet - ROLE_CHEF_PROJET
        - { path: ^/projets/nouveau, roles: ROLE_CHEF_PROJET }

        # Modifier/supprimer un projet - vérifié dans le contrôleur avec IsGranted
        # Les routes sont accessibles mais le contrôleur vérifie le créateur ou ROLE_ADMIN

        # Authentification
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

    # Note: Only the *first* matching rule is applied

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
